services:
  caddy:
    image: almighty-caddy:demo
    restart: unless-stopped
    ports:
      # Bind to the Tailscale IP only — public ingress stays closed.
      # cloud-init writes ${TAILSCALE_IP} into .env after `tailscale up`.
      - "${TAILSCALE_IP}:443:443"
      - "${TAILSCALE_IP}:80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ../../../web/renderer/dist:/srv/web:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      AWS_REGION: ${AWS_REGION}
      # Caddy reads AWS creds from the EC2 instance metadata service
      # automatically — the instance role has route53:ChangeResourceRecordSets
      # on the almightyengine.com hosted zone (same AWS account).
    depends_on: [control-plane, websocket]

  control-plane:
    image: node:20-bookworm-slim
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ../../../services/control-plane:/app
    # Project uses pnpm, not npm. corepack ships with node:20+; CI=true
    # tells pnpm to skip the no-TTY confirm prompt.
    # tsc emits to dist/src/server.js because the package's tsconfig
    # auto-detects rootDir from src/+tests/ — entry point reflects that.
    command: ["sh", "-c", "corepack enable && CI=true pnpm install --frozen-lockfile && pnpm run build && node dist/src/server.js"]
    environment:
      DATABASE_URL: ${SUPABASE_DATABASE_URL}
      PORT: "4000"
      # control-plane signs/verifies HS256 JWTs with this shared secret;
      # 32+ chars, random. Generated by the operator into secrets.env.
      JWT_SECRET: ${JWT_SECRET}
      SPARK_WORKER_URL: http://100.106.123.5:7000
    expose: ["4000"]

  websocket:
    image: node:20-bookworm-slim
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ../../../services/websocket:/app
    command: ["sh", "-c", "corepack enable && CI=true pnpm install --frozen-lockfile && pnpm run build && node dist/src/server.js"]
    environment:
      DATABASE_URL: ${SUPABASE_DATABASE_URL}
      PORT: "4001"
    expose: ["4001"]

  # czml-adapter is intentionally NOT in the demo compose. The renderer
  # uses the static nashville-vignette.czml for the map; live CZML
  # conversion isn't on the demo's critical path. Add it back if/when
  # the demo needs live spatial-effect rendering.

volumes:
  caddy-data:
  caddy-config:
